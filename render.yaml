databases:
  - name: optiflow-db
    plan: free

services:
  # The entire full-stack application served via a single Web Service.
  # This guarantees compliance with Render's free tier limits (1 Web Service + 1 DB).
  - type: web
    name: optiflow-fullstack
    env: docker
    dockerContext: .
    dockerfilePath: ./render.Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: optiflow-db
          property: connectionString
      - key: REDIS_URL
        sync: false # Provide your Upstash URL here
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
