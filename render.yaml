databases:
  - name: optiflow-db
    plan: free

services:
  # Deploy Redis as a private Docker service (100% free, avoids paid managed Redis errors)
  - type: pserv
    name: optiflow-redis
    env: image
    image:
      url: redis:alpine
    plan: free

  - type: web
    name: optiflow-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: optiflow-db
          property: connectionString
      - key: REDIS_URL
        value: redis://optiflow-redis:6379/0
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RESEND_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false

  - type: web
    name: optiflow-frontend
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run preview -- --host 0.0.0.0 --port 10000
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: optiflow-backend
          property: url
